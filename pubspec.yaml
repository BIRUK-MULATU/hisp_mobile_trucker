name: hisp_mobile_trucker
description: DHIS2-based mobile data entry application for HISP.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # Local Storage
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0
  logger: ^2.4.0
  connectivity_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
