name: hisp_mobile_trucker
description: DHIS2-based mobile data entry application for HISP.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # Local Storage
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.5   # SHA-256 for offline credential verification

  # Local Database (SQLite via drift)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  drift_db_viewer: ^2.1.0   # dev tool: browse the DB inside the app

  # Utilities
  intl: ^0.19.0
  logger: ^2.4.0
  connectivity_plus: ^7.2.0
  flutter_svg: ^2.3.0
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/